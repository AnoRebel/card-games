<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: felt-green gradient (the app's default theme) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1b3a2c"/>
      <stop offset="1" stop-color="#0f2419"/>
    </linearGradient>
    <linearGradient id="gold" x1="160" y1="120" x2="352" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4d27a"/>
      <stop offset="1" stop-color="#d4a857"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Fanned back card (offset, gold-edged) -->
  <g transform="rotate(-12 256 280)" filter="url(#shadow)">
    <rect x="150" y="140" width="180" height="252" rx="22" fill="#11261c" stroke="url(#gold)" stroke-width="4"/>
  </g>

  <!-- Front Ace card -->
  <g filter="url(#shadow)">
    <rect x="172" y="128" width="190" height="266" rx="24" fill="#fbf7ee"/>
    <!-- Top-left rank + pip -->
    <text x="196" y="178" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#1b3a2c">A</text>
    <!-- Center spade -->
    <path d="M267 196c-34 36-62 56-62 92 0 24 18 40 40 40 9 0 17-3 22-9-4 18-12 28-22 36h44c-10-8-18-18-22-36 5 6 13 9 22 9 22 0 40-16 40-40 0-36-28-56-62-92z" fill="#1b3a2c"/>
    <!-- Bottom-right rank (rotated) -->
    <text x="338" y="348" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="700" fill="#1b3a2c" transform="rotate(180 330 332)">A</text>
  </g>
</svg>
